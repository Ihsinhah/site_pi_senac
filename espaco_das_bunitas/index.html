<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço das Bunitas</title>
    <link rel="shortcut icon" href="midia/logotipoEspacoDasBunitas.png" type="image/x-icon">
    <!-- css links -->
    <link rel="stylesheet" href="style.css">
    <!-- end css links -->
</head>
<body>
    <main>
        <h1 class="font-null">NAME Gallery WebSite</h1>
        <!-- header -->
        <section>
            <h2 class="font-null">Header</h2>
            <header>
                <div class="header-container">
                    <!-- contact -->
                    <section>
                        <h2 class="font-null">Contact</h2>
                        <div>
                            <p class="contact">@algumaredesocial</p>
                            <p class="contact">(12) 3456-7890</p>
                        </div>
                    </section>
                    <!-- end contact -->

                    <!-- search bar -->
                    <section>
                        <h2 class="font-null">Search bar</h2>
                        <div>
                            <form action="none" class="search-bar">
                                <button type="submit" class="search-icon"><img src="midia/search.png" alt="Ícone de pesquisa">
                                </button>
                                <span style="color: #bd0075;">|</span>
                                <input class="search-input" type="text" name="search-bar" id="search-bar" placeholder="Pesquisar">
                            </form>
                        </div>
                    </section>
                    <!-- end search bar -->

                    <!-- login -->
                    <section>
                        <h2 class="font-null">Login link</h2>
                        <div>
                            <a class="login-color-word" href="login.html"><img src="midia/icon-person-pink.png" alt="Ícone de login" width="30" style="vertical-align: bottom;"> ENTRAR | CADASTRAR</a>
                        </div>
                    </section>
                    <!-- end login -->

                     <!-- logo -->
                    <section>
                        <h2 class="font-null">Logo</h2>
                        <div>
                            <img class="logotipo" src="midia/logotipoEspacoDasBunitas.png" alt="Logotipo Espaço das Bunitas" title="Logotipo Espaço das Bunitas">
                        </div>
                    </section>
                    <!-- end logo -->
                </div>
            </header>
        </section>
        <!-- end header-->

        <!-- navbar -->
        <nav>
        <h2 class="font-null">Navbar</h2>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Galeria</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Sobre</a></li>
            </ul>
        </nav>
        <!-- end navbar -->

        <!-- carousel -->
        <section>
            <h2 class="font-null">Carousel</h2>
            <div class="slide-container">
            <div class="transition">
                <img src="midia/image1.png" class="fade" alt="Imagem 1">
            </div>
            
            <div class="transition">
                <img src="midia/image2.jpg" class="fade" alt="Imagem 2">
            </div>
            
            <div class="transition">
                <img src="none" class="fade" alt="Imagem 3">
            </div>
            </div>
            
            <div class="dot-center">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </section>
        <!-- end carousel -->

        <!-- content -->
        <section>
            <h2 class="font-null">Content</h2>
            <div class="content">
                
            </div>
        </section>
        <!-- end content -->






        <!-- footer -->
        <footer>
            <section>
                <h2 class="font-null">Footer</h2>
                <div class="footer">
                    <p>Todos os direitos reservados</p>
                </div>
            </section>
        </footer>
        <!-- end footer -->
    </main> 

    <!-- link javascript -->
    <script src="carousel.js"></script>
    <!-- end javascript link -->
</body>
</html>
