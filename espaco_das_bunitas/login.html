<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço das Bunitas - Entrar</title>
    <link rel="shortcut icon" href="midia/logotipoEspacoDasBunitas.png" type="image/x-icon">
    <!-- css links -->
    <link rel="stylesheet" href="login.css">
    <!-- end css links -->
</head>
<body>
    <main>
        <h1 class="font-null">Espaço das Bunitas</h1>
        <!-- header -->
        <section>
            <h2 class="font-null">Login</h2>
            <div class="login-container">
                <h3>Seja bem-vinda de volta!</h3>
                <section>
                    <h2 class="font-null">Caixa de Login</h2>
                    <div class="login-box">
                        <form action="login">
                            <label for="login">E-mail</label><br><br>
                            <input type="email"><br><br>
                            <label for="password">Senha</label><br><br>
                            <input type="password"><br><br>
                            <button>Entrar</button>
                            <p>Não tem uma conta? <a href="sing-up.html" class="sing-up-button">Cadastre-se!</a></p>
                    
                        </form>
                    </div>
                </section>
            </div>
        </section>

        <!-- footer -->
        <footer>
            <section>
                <h2 class="font-null">Footer</h2>
                <div class="footer">
                    <p>Todos os direitos reservados</p>
                </div>
            </section>
        </footer>
        <!-- end footer -->
    </main> 

    <!-- link javascript -->
    <script src="carousel.js"></script>
    <!-- end javascript link -->
</body>
</html>
